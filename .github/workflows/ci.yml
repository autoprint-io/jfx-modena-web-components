name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @autoprint/jfx-modena-components exec playwright install --with-deps chromium

      - name: Codex automation self-test
        run: npm run codex:self-test

      - name: Verify workspace
        run: npm run verify

      - name: Check whitespace
        run: git diff --check

      - name: Check generated files are current
        run: git diff --exit-code

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            packages/components/playwright-report/
            packages/components/test-results/
          if-no-files-found: ignore
